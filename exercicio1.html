<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadros</title>
    <style>
        body {
            margin: 0;
        }

        main {
            display: grid;
            grid-template-columns: repeat(3, 160px);
            gap: 10px;
            padding: 20px;
            justify-content: center; 
        }

        .caixa {
            height: 80px;
            background: #3498db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            border-radius: 5px;
        }
    </style>
    <script>
        let totalItens = 0;

        window.onload = inicio;

        function inicio() {
            
            adicionarItens(30);

            window.addEventListener('scroll', verificarRolagem);
        }

        function adicionarItens(quantidade) {
            let itens = document.getElementsByTagName('main');
            let destino = itens[0];
            let novoConteudo = "";

            for (let i = 0; i < quantidade; i++) {
                totalItens++;
                let texto = `Item: ${totalItens}`;
                novoConteudo += novaCaixa(texto);
            }
            
            destino.innerHTML += novoConteudo;
        }

        function verificarRolagem() {

            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 10) {

                adicionarItens(3);
            }
        }

        function novaCaixa(conteudo) {
            return `<div class="caixa">${conteudo}</div>`;
        }
    </script>
</head>

<body>
    <main></main>
</body>

</html>
